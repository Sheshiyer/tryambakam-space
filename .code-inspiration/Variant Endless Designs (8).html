<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">FORMA | Initialization</title>
    <script src="https://cdn.tailwindcss.com/3.4.17" vid="5"></script>
    <style vid="6">
        :root {
            --bg-void: #050505;
            --fg-primary: #ffffff;
            --fg-secondary: #666666;
            --fg-tertiary: #333333;
            --border-color: rgba(255, 255, 255, 0.15);
            --accent-active: #00ff41;
            --font-display: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        body {
            background-color: var(--bg-void);
            color: var(--fg-primary);
            font-family: var(--font-display);
            overflow: hidden;
            width: 1200px;
            height: 800px;
            margin: 0 auto;
            position: relative;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        .init-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100%;
        }

        .log-panel {
            border-right: 1px solid var(--border-color);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .status-panel {
            padding: 40px;
            background: radial-gradient(circle at top right, #111 0%, #050505 100%);
            display: flex;
            flex-direction: column;
        }

        .header-hud {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--fg-secondary);
            margin-bottom: 40px;
        }

        .terminal-output {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--fg-secondary);
            line-height: 1.8;
            height: 400px;
            overflow: hidden;
            position: relative;
        }

        .terminal-line::before {
            content: ">";
            margin-right: 10px;
            color: var(--fg-tertiary);
        }

        .active-line {
            color: var(--fg-primary);
        }

        .progress-section {
            margin-top: auto;
        }

        .progress-bar-container {
            height: 2px;
            background: var(--fg-tertiary);
            width: 100%;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--fg-primary);
            width: 0%;
            transition: width 0.1s linear;
        }

        .check-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        .check-item {
            border: 1px solid var(--border-color);
            padding: 20px;
            font-family: var(--font-mono);
        }

        .check-label {
            display: block;
            font-size: 10px;
            color: var(--fg-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .check-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-dot {
            width: 4px;
            height: 4px;
            background: var(--fg-tertiary);
            border-radius: 50%;
        }

        .status-dot.active {
            background: var(--accent-active);
            box-shadow: 0 0 8px var(--accent-active);
        }

        .neural-viz {
            flex-grow: 1;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scan-lines {
            background: repeating-linear-gradient(
                0deg,
                rgba(255,255,255,0.02),
                rgba(255,255,255,0.02) 1px,
                transparent 1px,
                transparent 3px
            );
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 5;
        }

        .matrix-bg {
            position: absolute;
            font-family: var(--font-mono);
            font-size: 8px;
            color: rgba(255,255,255,0.05);
            width: 100%;
            height: 100%;
            padding: 10px;
            overflow: hidden;
            word-break: break-all;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        .loading-text {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        .crosshair {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 1px solid var(--border-color);
        }
        .ch-tl { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
        .ch-tr { top: -1px; right: -1px; border-left: 0; border-bottom: 0; }
        .ch-bl { bottom: -1px; left: -1px; border-right: 0; border-top: 0; }
        .ch-br { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }

    </style>
</head>
<body vid="7">
    <div class="init-container" vid="8">
        
        <div class="log-panel" vid="9">
            <div class="header-hud" vid="10">
                <span vid="11">Initialization Protocol</span>
                <span vid="12">System: 0x4F2A</span>
            </div>

            <div class="terminal-output" id="log-container" vid="13">
                <div class="terminal-line active-line" vid="14">Booting kernel 2.0.4...</div>
                <div class="terminal-line" vid="15">Allocating VRAM (12.4GB)...</div>
                <div class="terminal-line" vid="16">Binding neural weights...</div>
                <div class="terminal-line" vid="17">Contacting edge nodes...</div>
            </div>

            <div class="progress-section" vid="18">
                <div class="flex justify-between items-end font-mono text-[10px] uppercase text-zinc-500" vid="19">
                    <div vid="20">Neural Engine Load</div>
                    <div id="percentage" vid="21">0%</div>
                </div>
                <div class="progress-bar-container" vid="22">
                    <div class="progress-bar-fill" id="bar-fill" vid="23"></div>
                </div>
                <div class="flex justify-between font-mono text-[10px] text-zinc-600" vid="24">
                    <span vid="25">MTL_SYNC_OK</span>
                    <span vid="26">BUFFER_STREAM_LIVE</span>
                </div>
            </div>
        </div>

        
        <div class="status-panel" vid="27">
            <div class="neural-viz" vid="28">
                <div class="crosshair ch-tl" vid="29"></div>
                <div class="crosshair ch-tr" vid="30"></div>
                <div class="crosshair ch-bl" vid="31"></div>
                <div class="crosshair ch-br" vid="32"></div>
                <div class="scan-lines" vid="33"></div>
                <div class="matrix-bg" id="matrix" vid="34"></div>
                <div class="z-10 flex flex-col items-center" vid="35">
                    <div class="w-32 h-32 border border-white/10 rounded-full flex items-center justify-center mb-4" vid="36">
                        <div class="w-24 h-24 border border-white/20 rounded-full animate-spin [animation-duration:3s] flex items-center justify-center" vid="37">
                            <div class="w-2 h-2 bg-white rounded-full" vid="38"></div>
                        </div>
                    </div>
                    <span class="loading-text" vid="39">CALIBRATING TOPOLOGY</span>
                </div>
            </div>

            <div class="check-grid" vid="40">
                <div class="check-item" vid="41">
                    <span class="check-label" vid="42">Kernel Stability</span>
                    <div class="check-status" vid="43">
                        <span class="text-[14px]" vid="44">99.8%</span>
                        <div class="status-dot active" vid="45"></div>
                    </div>
                </div>
                <div class="check-item" vid="46">
                    <span class="check-label" vid="47">Edge Latency</span>
                    <div class="check-status" vid="48">
                        <span class="text-[14px]" vid="49">4.2ms</span>
                        <div class="status-dot active" vid="50"></div>
                    </div>
                </div>
                <div class="check-item" vid="51">
                    <span class="check-label" vid="52">Vector Cache</span>
                    <div class="check-status" vid="53">
                        <span class="text-[14px]" id="cache-status" vid="54">WAITING</span>
                        <div class="status-dot" id="cache-dot" vid="55"></div>
                    </div>
                </div>
                <div class="check-item" vid="56">
                    <span class="check-label" vid="57">Mesh Hash</span>
                    <div class="check-status" vid="58">
                        <span class="text-[14px]" id="hash-status" vid="59">PENDING</span>
                        <div class="status-dot" id="hash-dot" vid="60"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script vid="61">
        const logs = [
            "Initializing environment shaders...",
            "Loading topology neural networks...",
            "Syncing geometry pipelines...",
            "Mapping tessellation buffers...",
            "Verifying float16 accuracy...",
            "Handshaking with GPU cluster...",
            "Optimizing BVH structures...",
            "Initializing real-time raycaster...",
            "Preparing USDZ export module...",
            "Linking GLTF 2.0 serializers...",
            "Environment stabilization active.",
            "Ready for mesh generation."
        ];

        let logIdx = 0;
        const logContainer = document.getElementById('log-container');
        const barFill = document.getElementById('bar-fill');
        const percentage = document.getElementById('percentage');
        const matrix = document.getElementById('matrix');

        
        function updateMatrix() {
            let str = "";
            for(let i=0; i<500; i++) {
                str += Math.floor(Math.random() * 2);
            }
            matrix.innerText = str;
        }
        setInterval(updateMatrix, 100);

        
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 2;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                document.getElementById('cache-status').innerText = "STABLE";
                document.getElementById('cache-dot').classList.add('active');
                document.getElementById('hash-status').innerText = "VERIFIED";
                document.getElementById('hash-dot').classList.add('active');
            }
            barFill.style.width = `${progress}%`;
            percentage.innerText = `${Math.floor(progress)}%`;

            if (Math.random() > 0.85 && logIdx < logs.length) {
                const line = document.createElement('div');
                line.className = 'terminal-line active-line';
                line.innerText = logs[logIdx];
                
                
                if (logContainer.lastElementChild) {
                    logContainer.lastElementChild.classList.remove('active-line');
                }
                
                logContainer.appendChild(line);
                logIdx++;
                logContainer.scrollTop = logContainer.scrollHeight;
            }
        }, 100);
    </script>


</body></html>
